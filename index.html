<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비에이텍 주식회사 - Blue Advanced Technology</title>
    <style>
        /* 한화에어로스페이스 스타일 톤앤매너 정의 */
        :root {
            --bg-primary: #0b0f19;       /* 딥 네이비 블랙 */
            --bg-secondary: #161c2d;     /* 카드 및 섹션 배경 */
            --text-main: #ffffff;        /* 메인 텍스트 */
            --text-sub: #94a3b8;         /* 서브 텍스트 */
            --point-color: #ff6b00;      /* 한화 오렌지 포인트 */
            --border-color: #2d3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* 네비게이션 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--point-color);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 30px;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--point-color);
        }

        /* 🎬 비디오 배경 히어로 섹션 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 8%;
            position: relative;
            overflow: hidden;
        }

        /* 배경 비디오 스타일 (화질 개선 최적화 적용) */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            image-rendering: -webkit-optimize-contrast;
        }

        /* ✨ 영상 화질 저하를 숨기고 대기업 감성을 내는 격자 패턴 오버레이 */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 1단계: 미세한 점박이 도트 매트릭스 필터 레이어 구성 */
            background-image: radial-gradient(rgba(0, 0, 0, 0.4) 15%, transparent 15%);
            background-size: 3px 3px;
            /* 2단계: 뒤에 딥 네이비 암전 그라데이션 조합 */
            background-color: rgba(11, 15, 25, 0.5);
            background-blend-mode: overlay;
            z-index: 2;
        }

        /* 부드러운 그라데이션으로 한번 더 글자 가독성 보호 */
        .video-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(11, 15, 25, 0.75) 40%, rgba(11, 15, 25, 0.2) 100%);
            z-index: 2;
        }

        /* 콘텐츠가 영상 위에 뜨도록 설정 */
        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 700px;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: var(--point-color);
        }

        .hero p {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: var(--point-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: transform 0.3s, background-color 0.3s;
        }

        .cta-btn:hover {
            background-color: #e05e00;
            transform: translateY(-3px);
        }

        /* 공통 섹션 스타일 */
        section {
            padding: 100px 8%;
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 50px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 4px;
            background-color: var(--point-color);
        }

        /* 회사 개요 양식 */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .about-card {
            background-color: var(--bg-secondary);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .about-card h3 {
            color: var(--point-color);
            font-size: 16px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .about-card p {
            font-size: 20px;
            font-weight: 600;
        }

        .about-card span {
            display: block;
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 8px;
            font-weight: 400;
        }

        .cert-title-sub {
            font-size: 20px;
            font-
